    el('td', {}, expInp),
  el('td', {},
    el('label', { style:{ userSelect:'none' } }, 'Delivered ',

          // keep aggregate status/badges in sync

          // re-render to refresh UI
          this.edit(o.id);
        }
      })
    )
  ),
    el('td', {}, delBtn)
  );
});

    return el('div', {},
      el('h3', {}, 'Items'),

  }; // <-- CLOSE renderItemsTable properly

  // Core order fields

            o.origin = 'request';
            o.adhocCode = '';

          // Normalize items
          if (Array.isArray(o.items)) o.items = o.items.map(normalizeItem);

          // Keep status text consistent
          if (typeof recomputeStatus === 'function') recomputeStatus(o);

          // Upsert order (defensive)
          state.orders = Array.isArray(state.orders) ? state.orders : [];
          const idx = state.orders.findIndex(x => x.id === o.id);
          if (idx === -1) state.orders.push(o); else state.orders[idx] = o;

          // Optional undo snapshot

            try { setUndoSnapshot(); } catch(_) {}
          }

          // Once the order is persisted, clear the in-memory draft
          if (state && Object.prototype.hasOwnProperty.call(state, '_draftOrder')) {
            state._draftOrder = null;

OrderManager.prototype.renderFilesSection = function(order){

  // Use global helpers:
  // - _h(x) for HTML-escaping user-provided strings
  // - displayKind(k) for mapping legacy kind labels

  const kinds = ['PO','Invoice','Proforma','Offer','BankTransfer','Comparison'];
  const allowedDropKinds = new Set(['PO','Invoice','Proforma','Offer','BankTransfer','Comparison']);

  // Kind selector controls accept rules and DnD behavior
  const kindSel = el('select', {},

    ...kinds.map(k => el('option', { value:k }, k))
  );
  kindSel.value = 'Invoice';

  // Accept rules + hint text
  const acceptFor = (kind)=>{
    return '.pdf,application/pdf';
  };
  const hintFor = (kind)=>{
    return (kind === 'Comparison')
      ? 'Drop PDF. The file will be saved under Comparison.'
      : 'Drop PDF(s). They will be renamed automatically for this order.';
  };

// Renaming helpers
  const ymd = (d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const hms = (d)=>`${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}${String(d.getSeconds()).padStart(2,'0')}`;
  const codeFor = (o)=> (o.rfq || o.adhocCode || `ORDER-${o.id}`);
  // NOTE: renamed to avoid shadowing the global safeName() used elsewhere.
  const safeNameLoose = (s)=> String(s).replace(/[\\/:*?"<>|\x00-\x1F]/g,' ').replace(/\s+/g,' ').trim();

  // Base name WITHOUT extension (used only for non-Comparison kinds)
  const buildBaseName = (o, kind, idx=0)=>{
    const now = new Date();
    const base = `${codeFor(o)} - ${kind} - ${ymd(now)}_${hms(now)}`;
    const suffix = idx > 0 ? `-${idx+1}` : '';
    return safeNameLoose(`${base}${suffix}`);
  };

  const extFor = (kind, file) => {
    const name = (file && file.name) || '';
    const m = name.match(/\.[^.]+$/);
    if (m) return m[0];
    return (kind === 'Comparison') ? '' : '.pdf';
  };

  const renameFileForOrder = (file, o, kind, idx=0)=>{
    // IMPORTANT:
    // Comparison files must be saved exactly as uploaded
    // (same original filename + same file type, only sanitized later by saveFilesToOrder)
    if (kind === 'Comparison') return file;

    const base = buildBaseName(o, kind, idx);
    const ext  = extFor(kind, file) || '.pdf';
    const finalName = safeNameLoose(`${base}${ext}`);
    const type = file.type || 'application/pdf';
    return new File([file], finalName, { type });
  };

  // Hidden input (proxy for click)
  const fileInput = el('input', {
    type:'file',
    style:{ position:'absolute', left:'-9999px' },
    multiple:true,
    accept: acceptFor(kindSel.value),
    onchange: async (e)=>{
      try{
        const filesAll = Array.from(e.target.files || []);
        if (!filesAll.length) return;

        const currentKind = kindSel.value;

        if (currentKind === 'Comparison') {
          // Comparison is PDF-only
          const pdfs = filesAll.filter(f =>
            f && (
              f.type === 'application/pdf' ||
              /\.pdf$/i.test(f.name)
            )
          );
          if (!pdfs.length) { alert('Comparison accepts PDF files only.'); return; }

          if (typeof saveFilesToOrder === 'function') {
            await saveFilesToOrder(order, 'Comparison', pdfs);
          }
          if (typeof autoFlagForKind === 'function') autoFlagForKind('Comparison');
        } else {

          // Other kinds: PDFs only, renamed per your rule
          const pdfs = filesAll.filter(f => f && (f.type === 'application/pdf' || /\.pdf$/i.test(f.name)));
          if (!pdfs.length) { alert('Please choose PDF files for this kind.'); return; }

          const renamed = pdfs.map((f,i)=> renameFileForOrder(f, order, currentKind, i));
          if (typeof saveFilesToOrder === 'function') await saveFilesToOrder(order, currentKind, renamed);
          if (typeof autoFlagForKind === 'function') autoFlagForKind(currentKind);
        }

        // Keep flags/status in sync with actual refs
        if (typeof recomputeFlagsFromFiles === 'function') recomputeFlagsFromFiles(order);
        if (typeof recomputeStatus === 'function') recomputeStatus(order);
        if (typeof syncStatusUIFromFlags === 'function') syncStatusUIFromFlags(order);

        if (typeof save === 'function') save();
        rerenderFilesTable();
      } catch(err){
        alert('Attach failed: ' + (err && err.message ? err.message : err));
      } finally {
        // reset picker so same file can be chosen again
        e.target.value = '';
      }
    }
  });

// === Derive status flags from file refs (PO/Invoice/BankTransfer) ===

    ? order.statusFlags
    : { ordered:false, delivered:false, invoiced:false, paid:false };

  const refs = Array.isArray(order.files) ? order.files : [];

  const hasInvoice      = refs.some(r => (r.kind === 'Invoice'));

  order.statusFlags.ordered  = !!hasPO;
  // delivered remains manual — do NOT change it here

  order.statusFlags.paid     = !!hasBankTransfer;

  if (typeof recomputeStatus === 'function') recomputeStatus(order);

        if (typeof syncStatusUIFromFlags === 'function') syncStatusUIFromFlags(order);

        if (typeof save === 'function') save();
        rerenderFilesTable();
      } catch(err){
        alert('Attach failed: ' + (err?.message || err));
      }

      },

            el('div', { title: relPath }, (r.label || r.filename || '')),

          ),
          el('td', {}, (r.size != null ? (r.size/1024).toFixed(1) + ' KB' : '')),
          el('td', {}, new Date(r.date || Date.now()).toLocaleDateString()),

            el('button', {

// --- [Helpers] Expected date resolution & day difference (Europe/Bucharest implied) ---
function pickExpectedDate(order){
  // 0) If user set an order-level Expected Delivery, it overrides per-item expectations.
  if (order && order.expectedDelivery) return order.expectedDelivery;

  // 1) Otherwise: per-item expected date (take the earliest among UNDELIVERED items)
  const undelivered = (order.items || []).filter(it => !it.delivered && it.expectedDelivery);
  const dates = undelivered.map(it => it.expectedDelivery).filter(Boolean);
  if (dates.length){
    // ISO yyyy-mm-dd strings compare lexicographically for ordering
    return dates.sort()[0];
  }

  return '';
}

function daysFromToday(iso){
  if (!iso) return null;
  // Interpret as local date (yyyy-mm-dd), compare against today's local date
  const parts = iso.split('-').map(Number);
  if (parts.length !== 3 || !parts[0] || !parts[1] || !parts[2]) return null;
  const d = new Date(parts[0], parts[1]-1, parts[2]);    // local midnight
  const now = new Date();                                 // now in local TZ
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const ms = d - today;
  return Math.round(ms / 86400000); // days: negative = past (late), 0 today, positive = future
}

function badgeForDays(days, deliveredPercent){
  // returns [node, statusText] - UI pill and a textual status
  if (days === null) return [el('span', { class:'pill pill-info' }, '—'), 'No date'];
  if (deliveredPercent >= 100) {
    if (days >= 0) return [el('span', { class:'pill pill-ok' }, 'On time'), 'On time'];
    return [el('span', { class:'pill pill-ok' }, 'Delivered'), 'Delivered'];
  }
  if (days < 0)  return [el('span', { class:'pill pill-err' }, 'Late'), 'Late'];
  if (days <= 7) return [el('span', { class:'pill pill-warn' }, 'Due soon'), 'Due soon'];
  return [el('span', { class:'pill pill-info' }, 'Scheduled'), 'Scheduled'];
}

function paymentTermsToDays(txt){
  if (!txt || typeof txt !== 'string') return null;

  // Normalize: trim, collapse whitespace, uppercase
  const s = txt.trim().replace(/\s+/g, ' ').toUpperCase();

  // Strict mapping (your standardized dropdown values)
  if (s === '100% ADVANCE') return 0;
  if (s === '15 DAYS') return 15;
  if (s === '30 DAYS') return 30;
  if (s === '45 DAYS') return 45;
  if (s === '60 DAYS') return 60;

  // Unknown / unsupported term => do not auto-fill
  return null;
}

// --- Small helpers ---
function debounce(fn, wait=220){
  let t = null;
  return function(...args){
    clearTimeout(t);
    t = setTimeout(()=>fn.apply(this, args), wait);
  };
}

// --- Orders tab: parse + render multiple PO numbers in "Order No." cell (display-only) ---
function parsePONumbers(orderNoStr){
  if (!orderNoStr) return [];
  const raw = String(orderNoStr).trim();
  if (!raw) return [];
  // Your current habit: "PO1 / PO2 / PO3" and sometimes newlines
  return raw
    .split(/[\n\/]+/g)
    .map(s => s.trim())
    .filter(Boolean);
}

function ensurePOPopoverGlobalCloser(){
  if (window.__poPopoverCloserInstalled) return;
  window.__poPopoverCloserInstalled = true;

  document.addEventListener('click', (e) => {
    const cur = window.__poOpenPopover;
    if (!cur) return;
    if (cur.wrap && !cur.wrap.contains(e.target)) {
      cur.pop.classList.remove('open');
      window.__poOpenPopover = null;
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    const cur = window.__poOpenPopover;
    if (cur && cur.pop) {
      cur.pop.classList.remove('open');
      window.__poOpenPopover = null;
    }
  });
}

function copyPlainText(txt){
  if (!txt) return;

  const okToast = (msg) => {
    if (typeof showCopyToast === 'function') showCopyToast(msg);
    else if (typeof notify === 'function') notify('success', msg);
  };

  const fallback = () => {
    try{
      const ta = document.createElement('textarea');
      ta.value = txt;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      okToast('Copied');
    }catch(_){
      try { window.prompt('Copy:', txt); } catch(__) {}
    }
  };

  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=> okToast('Copied')).catch(fallback);
  } else {
    fallback();
  }
}

function renderOrderNoCell(o){
  const list = parsePONumbers(o && o.orderNo ? o.orderNo : '');

  // 0 PO => empty
  if (list.length === 0){
    return el('span', {}, '');
  }

  const wrap = el('div', { class:'po-cell' });

  const makeCopyBtn = (txt) => el('button', {
    class:'po-copy',
    title:'Copy PO',
    onclick:(e)=>{ e.preventDefault(); e.stopPropagation(); copyPlainText(txt); }
  }, '⧉');

  // 1–3 POs: show each as pill (copy per pill)
  if (list.length <= 3){
    list.forEach(txt => {
      wrap.appendChild(
        el('span', { class:'po-pill', title: txt },
          el('span', { class:'po-text' }, txt),
          makeCopyBtn(txt)
        )
      );
    });
    return wrap;
  }

  // 4+ POs: grouped pill + popover list
  ensurePOPopoverGlobalCloser();

  const trigger = el('span', {
    class:'po-pill po-group',
    tabindex:'0',
    title:'Show all POs'
  }, `POs (${list.length})`);

  const pop = el('div', { class:'po-pop' },
    ...list.map(txt =>
      el('div', { class:'po-row' },
        el('span', { class:'po-text', title: txt }, txt),
        makeCopyBtn(txt)
      )
    )
  );

  const open = () => {
    // Close any other open popover first
    const cur = window.__poOpenPopover;
    if (cur && cur.pop && cur.pop !== pop) cur.pop.classList.remove('open');

    pop.classList.add('open');
    window.__poOpenPopover = { wrap, pop };
  };

  const close = () => {
    pop.classList.remove('open');
    if (window.__poOpenPopover && window.__poOpenPopover.pop === pop) {
      window.__poOpenPopover = null;
    }
  };

  let t = null;
  const scheduleClose = () => {
    clearTimeout(t);
    t = setTimeout(close, 140);
  };

  trigger.addEventListener('mouseenter', open);
  trigger.addEventListener('mouseleave', scheduleClose);
  pop.addEventListener('mouseenter', () => { clearTimeout(t); open(); });
  pop.addEventListener('mouseleave', scheduleClose);

  trigger.addEventListener('click', (e) => {
    e.preventDefault(); e.stopPropagation();
    if (pop.classList.contains('open')) close(); else open();
  });

  wrap.appendChild(trigger);
  wrap.appendChild(pop);
  return wrap;
}

    const supplierName = this.getMainSupplier(o);
    const hit =
      match(o.rfq, q) ||
      match(o.orderNo, q) ||
      match(o.adhocCode, q) ||
      match(o.title, q) ||
      match(supplierName, q) ||
      match(o.invoice?.number, q) ||
      match(paidStr, q) ||
      match(o.note, q);     // NEW
    if (!hit) return false;
  }

  // 3) Toggle filters (Only Late / Due soon) based on expected date and delivery %
  if (lateOnly || dueSoonOnly) {
    const items = Array.isArray(o.items) ? o.items : [];
    const deliveredItems = items.filter(it => it.delivered).length;
    const totalItems = items.length || 1;
    const deliveredPercent = Math.round((deliveredItems / totalItems) * 100);

    const expISO = pickExpectedDate(o);
    const days   = daysFromToday(expISO);

    // If no date, never count as late/due-soon
    if (days === null) return false;
    if (deliveredPercent >= 100) return false; // fully delivered != late/due-soon

    if (lateOnly)    return days < 0;
    if (dueSoonOnly) return days >= 0 && days <= 7;
  }

  return true;
});

      const cur = it.currency || 'RON';
      const qty = clampNonNeg(it.qtyTotal ?? it.qty);
      const price = clampNonNeg(it.unitPrice);
      const val = qty * price;
      if (!val) return acc;
      acc[cur] = (acc[cur] || 0) + val;
      return acc;
    }, {});

    let entries = Object.entries(totalsByCur);

    if (!entries.length && inv.amount != null) {

      // Expected + Days (uses per-item earliest undelivered, else order-level)

container.appendChild(table);

// ===== Class: ComparisonManager - Supports comparing supplier quotes (now with discount per supplier) and selecting winners per item.
class ComparisonManager {
  constructor(state){ this.state = state; }

  getOpenOrders(){
    // "Open" for Comparison tab:
    //  - has at least 1 item
    //  - workflow stage is exactly "Ongoing"
    const orders = Array.isArray(this.state.orders) ? this.state.orders : [];
    return orders.filter(o=>{
      if (!o || !Array.isArray(o.items) || !o.items.length) return false;

      const stage = (o.stage || 'Ongoing');
      return stage === 'Ongoing';
    });
  }

  supplierName(id){
    const s = this.state.suppliers.find(x=>x.id===id);
    return s?.company || (id||'(none)');
  }

  ensureComparison(order){
    if (!this.state.comparisons) this.state.comparisons = {};
    const key = order.id;
    let cmp = this.state.comparisons[key];

    if (!cmp) {
      // seed unique suppliers from items, ensure at least 3 slots
      const guess = [...new Set((order.items||[]).map(it=>it.supplierId).filter(Boolean))];
      while (guess.length < 3) guess.push('');
      cmp = this.state.comparisons[key] = {
        orderId: order.id,
        supplierIds: guess,                  // variable length, >= 3
        fx: { EUR: 5.06, USD: 4.50 },
        vat: 21,
        perSupplier: {},                     // id -> { transport, transportCurrency, discount, discountCurrency, paymentTerms }
        quotes: {},                          // idx -> sid -> { price, currency, delivery }
        winners: {}
      };
    }

    // sanity: array and at least 3 slots
    cmp.supplierIds = Array.isArray(cmp.supplierIds) ? cmp.supplierIds : ['', '', ''];
    while (cmp.supplierIds.length < 3) cmp.supplierIds.push('');

    // ensure quotes bag per item
    (order.items||[]).forEach((_, idx)=>{ cmp.quotes[idx] = cmp.quotes[idx] || {}; });

  // ensure perSupplier bags, defaulting paymentTerms from Supplier *only if empty*
(cmp.supplierIds || []).forEach(id => {
  if (!id) return;
  const sup = this.state.suppliers.find(s => s.id === id);
  const existing = cmp.perSupplier[id];
  if (existing) {
    // keep what the order already had (do NOT overwrite)
    return;
  }

cmp.perSupplier[id] = {
    transport: '',
    transportCurrency: 'RON',
    discount: 0,
    discountCurrency: 'RON',
    paymentTerms: (sup && sup.paymentTerms) ? sup.paymentTerms : '',
    currency: 'RON', // default per-supplier offer currency
    deliveryDays: '' // default delivery time (days) per supplier
  };
});

// MIGRATION/GUARD: normalize legacy perSupplier objects
Object.keys(cmp.perSupplier || {}).forEach(pid => {
  const ps = cmp.perSupplier[pid];
  if (!ps) return;

  // if older data stored transport as 0 or "0", treat as empty
  if (ps.transport === 0 || ps.transport === '0') ps.transport = '';

  // ensure deliveryDays always exists so UI bindings are safe
  if (typeof ps.deliveryDays === 'undefined') ps.deliveryDays = '';
});

save();
return cmp;
  }

  rate(cmp, currency){
    if (!currency || currency === 'RON') return 1;

    // Defensive guards: avoid NaN if cmp.fx.* is absent or invalid
    const fx = cmp && cmp.fx ? cmp.fx : {};
    if (currency === 'EUR') {
      const v = clampNonNeg(fx.EUR);
      return Number.isFinite(v) && v > 0 ? v : 1;
    }
    if (currency === 'USD') {
      const v = clampNonNeg(fx.USD);
      return Number.isFinite(v) && v > 0 ? v : 1;
    }
    return 1;
  }

  lineTotalRON(order, cmp, idx, supplierId){
    const it = order.items[idx];
    const q = cmp.quotes[idx]?.[supplierId];
    if (!q) return 0;
    const qty = clampNonNeg(it.qtyTotal);
    const price = clampNonNeg(q.price);
    const r = this.rate(cmp, q.currency||'RON');
    return qty * price * r;
  }

  // NEW: totals with discount BEFORE VAT
  supplierTotalsRON(order, cmp, supplierId){
    const sumLines = order.items.reduce(
      (acc, _, idx)=> acc + this.lineTotalRON(order, cmp, idx, supplierId), 0
    );

const ps = cmp.perSupplier[supplierId] || {
  transport:'', transportCurrency:'RON',
  discount:0,    discountCurrency:'RON',
  paymentTerms:'',
  deliveryDays:'' // keep shape aligned with cmp.perSupplier initialization
};

    const tr   = clampNonNeg(ps.transport) * this.rate(cmp, ps.transportCurrency||'RON');
    const disc = clampNonNeg(ps.discount)  * this.rate(cmp, ps.discountCurrency||'RON');

    // Apply discount BEFORE VAT; clamp base to >= 0
    const totalNoVat = Math.max(0, sumLines + tr - disc);
    const vatAmt     = totalNoVat * (clampNonNeg(cmp.vat)/100);

    return {
      sumLinesRON: sumLines,
      transportRON: tr,
      discountRON: disc,
      totalNoVat,
      vatAmt,
      totalWithVat: totalNoVat + vatAmt
    };
  }

  setWinner(cmp, idx, supplierId){
    cmp.winners = cmp.winners || {};
    if (supplierId) cmp.winners[idx] = supplierId;
    else delete cmp.winners[idx];
    save();
  }

  clearAllWinners(cmp){
    if (!cmp) return;
    cmp.winners = {};
    save();
  }

  autoSelectLowest(order, cmp){
    cmp.winners = cmp.winners || {};
    order.items.forEach((_, idx)=>{
      const opts = (cmp.supplierIds||[]).filter(Boolean).map(sid=>{
        return { sid, total: this.lineTotalRON(order, cmp, idx, sid) };
      }).filter(x=>x.total>0);
      if(!opts.length) return;
      opts.sort((a,b)=>a.total-b.total);
      cmp.winners[idx] = opts[0].sid;
    });
    save();
  }

applySelectionToOrder(order, cmp, silent=false){

    // Defensive guards: nothing to do if data is missing
    if (!order || !Array.isArray(order.items) || !cmp || !cmp.quotes) return;

    // 1) Copy winner supplier + price/currency into each item, but DO NOT touch status flags
    order.items.forEach((it, idx)=>{
      const sid = cmp.winners?.[idx];
      if (!sid) return;
      const q = cmp.quotes[idx]?.[sid];
      if (!q) return;

      it.supplierId = sid;
      it.unitPrice  = clampNonNeg(q.price);
      it.currency   = q.currency || 'RON';
    });

    // 2) Auto-fill expected delivery dates from per-supplier delivery time (days),
    //    but only when the item does not already have an expectedDelivery.
    const baseDateStr = order.orderDate || order.createdAt || new Date().toISOString().slice(0,10);
    let baseDate = new Date(baseDateStr);
    if (isNaN(baseDate.getTime())) {
      baseDate = new Date();
    }

    order.items.forEach((it, idx) => {
      const sid = cmp.winners?.[idx];
      if (!sid) return;

      const ps = (cmp.perSupplier || {})[sid];
      const dRaw = ps ? ps.deliveryDays : null;
      const dNum = Number(dRaw);
      if (!Number.isFinite(dNum) || dNum <= 0) return;  // nothing to apply
      if (it.expectedDelivery) return;                  // do not overwrite manual dates

      const d = new Date(baseDate.getTime());
      d.setDate(d.getDate() + dNum);
      it.expectedDelivery = d.toISOString().slice(0,10);
    });

    // 3) Keep textual status in sync if helper exists, but don't flip any flags here
    if (typeof recomputeStatus === 'function') {
      try { recomputeStatus(order); } catch(_) {}
    }

    save();
    if (!silent) alert('Applied selection to order items.');
  }

// Build the small “Offers” list (no IIFE, no early return)

  getView(){

// Remove an extra supplier slot (index >= 3)
const removeSlot = (slotIdx)=>{
  const sid = cmp.supplierIds[slotIdx] || '';

  // check if this supplier is used (quotes/winners)
  const usedAsWinner = sid && Object.values(cmp.winners || {}).some(w => w === sid);
  const hasQuotes = sid && order.items.some((_, idx)=>{
    const q = cmp.quotes?.[idx]?.[sid];
    return q && (q.price || q.delivery || q.currency);
  });

  if ((usedAsWinner || hasQuotes) && !confirm('Removing this slot will clear its quotes and any winners pointing to it. Continue?')) {
    return;
  }

  // cleanup winners
  if (sid && cmp.winners){
    Object.keys(cmp.winners).forEach(k => { if (cmp.winners[k] === sid) delete cmp.winners[k]; });
  }
  // cleanup quotes
  order.items.forEach((_, idx)=>{
    if (cmp.quotes?.[idx]) delete cmp.quotes[idx][sid];
  });
  // cleanup perSupplier bag
  if (sid && cmp.perSupplier) delete cmp.perSupplier[sid];

  const currentId = cmp.supplierIds[slotIdx] || '';

  });

  const list = el('div', {

  });

    if (!sid) return;
    const sup = suppliers.find(s => s.id === sid);
    if (!cmp.perSupplier[sid]) {
      cmp.perSupplier[sid] = {

      };

  };

    matches = suppliers.filter(s => {
      const name = (s.company || '').toLowerCase();
      if (!q) return true;
      return name.includes(q);
    }).slice(0, 25);

    list.innerHTML = '';
    if (!matches.length) {
      list.style.display = 'none';
      activeIdx = -1;
      return;
    }

    matches.forEach((s, idx)=>{
      const row = el('div', {
        class: 'cmp-sup-ac-item' + (idx === activeIdx ? ' is-active' : ''),
        onclick: ()=> selectSupplier(s.id),
        onmousedown: (e)=> e.preventDefault() // prevent blur before click
      }, s.company || '(Unnamed)');
      list.appendChild(row);
    });

    list.style.display = 'block';
  };

  const moveActive = (delta)=>{
    if (!matches.length) return;
    if (activeIdx === -1) activeIdx = 0;
    else activeIdx = (activeIdx + delta + matches.length) % matches.length;

    const rows = list.querySelectorAll('.cmp-sup-ac-item');
    rows.forEach((r, i)=>{
      if (i === activeIdx) r.classList.add('is-active');
      else r.classList.remove('is-active');
    });
  };

  input.addEventListener('focus', () => {
    rebuildList();
  });

    activeIdx = -1;
    rebuildList();
  });

      e.preventDefault();
      moveActive(1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      moveActive(-1);
    } else if (e.key === 'Enter') {
      if (activeIdx >= 0 && matches[activeIdx]) {
        e.preventDefault();
        selectSupplier(matches[activeIdx].id);
      }
    } else if (e.key === 'Escape') {
      list.style.display = 'none';

// === Scale the grid + totals to fit the available width (stronger) ===
function fitComparisonToWidth(container){
  try {
    // Reset scale to measure natural width
    container.style.removeProperty('--cmp-scale');
    container.classList.remove('scaled');

    requestAnimationFrame(() => {
      const table = container.querySelector('.cmp-grid-table table');
      const totals = container.querySelector('.cmp-totals-sticky');
      if (!table) return;

      // Measure the widest child (table or totals bar) to avoid tiny overflow
      const tableW  = table.scrollWidth || 0;
      const totalsW = totals ? totals.scrollWidth : 0;
      const natural = Math.max(tableW, totalsW);

      const available = container.clientWidth || 0;
      if (!available || !natural) return;

      const scale = Math.min(1, available / natural);

      // Apply scale and toggle page horizontal overflow when scaled
      container.style.setProperty('--cmp-scale', String(scale));
      if (scale < 0.999) {
        container.classList.add('scaled');
        document.documentElement.classList.add('no-h-scroll');
        document.body.classList.add('no-h-scroll');
      } else {
        document.documentElement.classList.remove('no-h-scroll');
        document.body.classList.remove('no-h-scroll');
      }
    });
  } catch (e) {
    console.warn('fitComparisonToWidth failed:', e);
  }
}

  if (supCount <= 3) {

    mode = 'mid';
  } else {
    mode = 'many';
  }

  if (mode) {

  }

  const compact = (w < 1440) || (supCount >= 5);

}

/** Pick a single .xlsx template (File System Access API if available; otherwise a hidden <input type=file>). */
async function pickExcelTemplate(){
  // Modern browsers
  if (window.showOpenFilePicker) {
    const [handle] = await window.showOpenFilePicker({
      multiple: false,
      types: [{
        description: 'Excel Workbook',
        accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
      }]
    });
    const file = await handle.getFile();
    return await file.arrayBuffer();
  }

  // Fallback: hidden input
  return new Promise((resolve, reject)=>{
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
    inp.style.display = 'none';
    document.body.appendChild(inp);
    inp.onchange = async () => {
      try {
        const f = inp.files && inp.files[0];
        if (!f) { reject(new Error('No file selected')); return; }
        const ab = await f.arrayBuffer();
        resolve(ab);
      } catch(e){ reject(e); }
      finally { inp.remove(); }
    };
    inp.click();
  });
}

/** RO date format DD.MM.YYYY */
function fmtDateRO(dt){
  const d = (dt instanceof Date) ? dt : new Date(dt);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}.${mm}.${yyyy}`;
}

// === XLSX helpers for addressing and formulas ===
function colLetter(n){ // 0-based index -> Excel column letter
  let s = ""; n = Number(n);
  while (n >= 0){ s = String.fromCharCode(n % 26 + 65) + s; n = Math.floor(n / 26) - 1; }
  return s;
}
function cellRef(colIndex0, row){ return colLetter(colIndex0) + String(row); } // 0-based col, 1-based row

// Write a 2D array at cell origin (A1-style)
function aoa(ws, a2d, origin){ XLSX.utils.sheet_add_aoa(ws, a2d, { origin }); }

// Set text/number into single cell (A1)
function setVal(ws, a1, v){
  const cell = ws[a1] || (ws[a1] = {});
  cell.t = (typeof v === 'number') ? 'n' : 's';
  cell.v = v;
  if (typeof v === 'string') delete cell.f;
}

// Set formula into single cell (A1)
function setFormula(ws, a1, f){
  const cell = ws[a1] || (ws[a1] = {});
  cell.t = 'n';
  cell.f = f;
  delete cell.v;
}

function absA1(a1){
  const m = /^([A-Z]+)(\d+)$/i.exec(a1);
  return m ? `$${m[1].toUpperCase()}$${m[2]}` : a1;
}

// Get supplier currency from per-line quotes or per-supplier settings. Fallback: RON.
function supplierCurrency(order, cmp, sid){
  const up = v => (v ? String(v).toUpperCase().trim() : null);
  const norm = c => {
    if (!c) return null;
    if (c === 'LEI') return 'RON';
    if (c === 'EURO') return 'EUR';
    return c;
  };

  // 1) Per-supplier settings block (if present)
  const ps = cmp?.perSupplier?.[sid];
  const fromPS = norm(up(ps?.currency || ps?.curr || ps?.ccy || ps?.currencyCode));
  if (fromPS) return fromPS;

  // 2) Scan per-line quotes for this supplier
  const items = Array.isArray(order?.items) ? order.items : [];
  for (let i = 0; i < items.length; i++){
    const q = cmp?.quotes?.[i]?.[sid];
    const fromQ = norm(up(q?.currency || q?.curr || q?.ccy || q?.currencyCode));
    if (fromQ) return fromQ;
  }

  // 3) Default
  return 'RON';
}

// Header name for Excel export: prefer Legal Name, fallback to Company
function supplierHeaderNameById(id){
  const arr = Array.isArray(state?.suppliers) ? state.suppliers : [];
  const s = arr.find(x => x.id === id);
  // trimStr exists in your app; if not near here, just drop trimStr and use .trim()
  const name = s ? (s.legalName || s.company || '') : '';
  return trimStr ? trimStr(name) : String(name).trim();
}

function currencyNumFmt(cur){
  cur = (cur || 'RON').toUpperCase();
  if (cur === 'EUR') return '#,##0.00 "EUR"';
  if (cur === 'USD') return '#,##0.00 "USD"';
  return '#,##0.00 "RON"';
}

// FX lookup for a currency code (RON/EUR/USD)
function fxForCurrency(cur, fxEUR, fxUSD){
  if (!cur) return 1;
  cur = String(cur).toUpperCase();
  if (cur === 'RON') return 1;
  if (cur === 'EUR') return Number(fxEUR || 0) || 0;
  if (cur === 'USD') return Number(fxUSD || 0) || 0;
  return 1;
}

// Build pair columns indices for N supplier pairs, starting at E (col=4 zero-based)
function supplierPairs(n, startColIndex0){
  const pairs = [];
  let c = startColIndex0;
  for (let i=0;i<n;i++){ pairs.push({ priceCol0:c, totalCol0:c+1 }); c+=2; }
  return pairs;
}

// Resolve FX (EUR, USD) and VAT from the comparison or global state.
// Tries multiple common paths; defaults VAT to 21 if not set.
function resolveFxVat(cmp){
  const out = { EUR: null, USD: null, VAT: null };

  const readNum = v => (v === '' || v == null) ? null : (isFinite(+v) ? +v : null);

  // 1) Preferred flat fields on cmp
  if (cmp){
    if (out.EUR == null) out.EUR = readNum(cmp.fxEUR);
    if (out.USD == null) out.USD = readNum(cmp.fxUSD);
    if (out.VAT == null) out.VAT = readNum(cmp.vat);
  }

  // 2) Nested objects on cmp (cmp.fx or cmp.exchangeRates)
  if (cmp && cmp.fx){
    if (out.EUR == null) out.EUR = readNum(cmp.fx.EUR) ?? readNum(cmp.fx.eur);
    if (out.USD == null) out.USD = readNum(cmp.fx.USD) ?? readNum(cmp.fx.usd);
  }
  if (cmp && cmp.exchangeRates){
    if (out.EUR == null) out.EUR = readNum(cmp.exchangeRates.EUR) ?? readNum(cmp.exchangeRates.eur);
    if (out.USD == null) out.USD = readNum(cmp.exchangeRates.USD) ?? readNum(cmp.exchangeRates.usd);
  }

  // 3) Fallback to global state (if your toolbar stores them globally)
  const s = (window.state || {});
  if (out.EUR == null) out.EUR = readNum(s.fxEUR) ?? readNum(s.fx?.EUR) ?? readNum(s.fx?.eur);
  if (out.USD == null) out.USD = readNum(s.fxUSD) ?? readNum(s.fx?.USD) ?? readNum(s.fx?.usd);
  if (out.VAT == null) out.VAT = readNum(s.vat);

  // 4) Final defaults
  out.EUR = isFinite(out.EUR) ? out.EUR : 0;
  out.USD = isFinite(out.USD) ? out.USD : 0;
  out.VAT = isFinite(out.VAT) ? out.VAT : 21;

  return out;
}

          if (handle.kind !== 'file') continue;
          if (!/\.xlsx$/i.test(name)) continue;
          if (name === fileName) continue;
          try { await cmpDir.removeEntry(name); } catch(_) {}
        }
      } catch(_) {}

      // Overwrite the single canonical file
      const fh = await cmpDir.getFileHandle(fileName, { create: true });
      const writable = await fh.createWritable();
      await writable.write(out);
      await writable.close();

      // Remember for "Open last Excel"
      const key = order?.id || order?.rfq || order?.adhocCode || 'no-code';
      LastXlsxByOrder.set(key, { name: fileName });

      if (typeof notify === 'function') {
        notify('success', `Excel saved to Order → Comparisons/${fileName}`);
      }

      saved = true;
    } catch (errFsa) {
      console.warn('Saving Excel via File System Access failed, falling back:', errFsa);
      // If handle is stale / invalid, clear remembered base folder so user can re-select
      if (errFsa && errFsa.name === 'InvalidStateError') {
        try { await _idbPut(HANDLE_BASE_DIR_KEY, null); } catch(_) {}
      }
    }
  }

  // 2) If not saved yet, try showSaveFilePicker (user chooses location)
  if (!saved && window.showSaveFilePicker) {
    try {
      // "Save As" dialog defaulting to the order folder if possible
      let startIn;
      try { startIn = await ensureOrderComparisonFolder(order); } catch {}
      const fh = await window.showSaveFilePicker({
        suggestedName: fileName,
        startIn,
        types: [{
          description: 'Excel Workbook',
          accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
        }]
      });
      const writable = await fh.createWritable();
      await writable.write(out);
      await writable.close();
      if (typeof notify === 'function') notify('success', `Excel saved: ${fh.name}`);
      saved = true;
    } catch (errPicker) {
      // User may have cancelled dialog; do not treat as hard error
      if (errPicker && errPicker.name === 'AbortError') {
        console.warn('User cancelled Save As dialog for Excel export.');
      } else {
        console.warn('showSaveFilePicker failed, falling back to download:', errPicker);
      }
    }
  }

  // 3) Final fallback: browser download (also tries order folder via saveComparisonXlsxToOrderFolder)
  if (!saved) {
    downloadArrayBufferAsXlsx(out, fileName);
    if (typeof notify === 'function') {
      notify('warn', 'Saved via download (no folder permission)');
    }
  }
} catch (err) {
  // Catch only truly unexpected errors
  console.error(err);
  if (typeof notify === 'function') {
    notify('error', 'Saving Excel failed: ' + (err?.message || err));
  }
}
}

// Save a generated blob as a Comparison XLSX in the order's folder and register it to order.files
async function saveComparisonXlsxToOrderFolder(order, blob, filename){
  try{
    const base = await getBaseFolder(); // user-chosen root
    if (!base) throw new Error('No base folder selected');
    // Build path segments for Comparison for this order (uses your existing convention)
    const segments = expectedSegmentsFor(order, 'Comparison');
    const dir = await getDirHandleFromSegments(base, segments, true);

    // Write file
    const fh = await dir.getFileHandle(filename, { create: true });
    const w = await fh.createWritable();
    await w.write(blob);
    await w.close();

    // Register metadata (idempotent-ish)
    order.files = Array.isArray(order.files) ? order.files : [];
    order.files.push({
      kind: 'Comparison',
      filename,
      label: filename,
      size: blob.size,
      date: Date.now(),
      segments
    });
    save();
    return true;
  } catch (e){
    console.error('saveComparisonXlsxToOrderFolder failed:', e);
    return false;
  }
}

// Main renderer: swaps the active manager view into .view based on currentTab.
function render() {
  const view = document.querySelector('.view');
  if (!view) {
    console.warn('render(): .view container not found yet');
    return;
  }

  const managerByTab = {
    orders:      orderManager,
    suppliers:   supplierManager,
    comparisons: comparisonManager,
    tracking:    trackingManager
  };

  // Fallback if an unknown/removed tab was saved previously
  if (!managerByTab[state.currentTab]) {
    state.currentTab = 'orders';
    try { save(); } catch(_) {}
  }

  const active = managerByTab[state.currentTab];

  // show view or a friendly error pane
  let viewNode;
  try {
    viewNode = active.getView();
  } catch (err) {
    console.error(err);
    viewNode = el('div', { class:'pane' },
      el('h3', {}, 'View error'),
      el('p', {}, 'Something went wrong while rendering this tab. Details:'),
      el('pre', { style:{whiteSpace:'pre-wrap'} }, (err && err.stack) ? err.stack : String(err))
    );
  }

  const container = el('div', {}, renderTabs(), viewNode);
  view.innerHTML = '';
  view.appendChild(container);

  // Apply virtualization if present
  if (window.__VIRT__ && __VIRT__.apply) __VIRT__.apply();
}

// --- Global error hooks (helps catch "nothing renders" situations) ---
(function installGlobalErrorHooks(){
  if (window.__globalErrHooksInstalled) return;
  window.__globalErrHooksInstalled = true;

  let lastToastAt = 0;
  const showErr = (msg) => {
    const now = Date.now();
    if (now - lastToastAt < 800) return; // avoid spam
    lastToastAt = now;

    try {
      if (typeof notify === 'function') notify('error', msg);
      else if (typeof showCopyToast === 'function') showCopyToast(msg);
      else alert(msg);
    } catch(_) {}
  };

  window.addEventListener('error', (e) => {
    const err = e && e.error;
    const msg = (err && err.message) ? err.message : (e && e.message) ? e.message : 'Unknown error';
    console.error('Unhandled error:', err || e);
    showErr('Error: ' + msg);
  });

  window.addEventListener('unhandledrejection', (e) => {
    const r = e && e.reason;
    const msg = (r && r.message) ? r.message : String(r || 'Unknown rejection');
    console.error('Unhandled rejection:', r);
    showErr('Error: ' + msg);
  });
})();

// Bootstrap (robust: run even if already interactive/complete)
(function bootstrap(){
  const start = () => {
    // 1) Immediate render from current in-memory state
    try { render(); } catch (e) { console.error('Initial render failed:', e); }

    // 2) Hint storage persistence (optional, best-effort)
    if (navigator.storage && navigator.storage.persist) {
      try { navigator.storage.persist(); } catch(_) {}
    }

    // 3) Hydrate from IndexedDB (source of truth) and re-render
    (async () => {
      try {
        const idbState = await appStateGet('current');
        if (idbState) {
          Object.keys(state).forEach(k => delete state[k]);
          Object.assign(state, idbState);
          if (typeof migrate === 'function') migrate(state._schemaVersion);
          try { render(); } catch (e) { console.error('Re-render after IDB hydrate failed:', e); }
        } else {
          // First run for IDB: migrate from localStorage (if any)
          const raw = localStorage.getItem(LS_KEY);
          if (raw) {
            try {
              const fromLS  = JSON.parse(raw);
              const cleaned = JSON.parse(JSON.stringify(fromLS, storageReplacer));
              if (typeof migrate === 'function') {
                Object.keys(fromLS).forEach(k => delete fromLS[k]);
                Object.assign(fromLS, cleaned);
                migrate(fromLS._schemaVersion);
              }
              await appStateSet('current', cleaned);
              // Shrink LS to tiny meta only
              localStorage.removeItem(LS_KEY);
              localStorage.setItem(LS_KEY, JSON.stringify({
                _schemaVersion: cleaned._schemaVersion ?? 3,
                migratedAt: new Date().toISOString()
              }));
            } catch {}
          }
        }
      } catch (e) {
        console.warn('IDB hydrate failed:', e);
      }
    })();
  };

  if (document.readyState === 'complete' || document.readyState === 'interactive') start();
  else window.addEventListener('load', start);
})();
